<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VTable 诊断方案</title>
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vtable/dist/vtable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vchart/build/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
      require.config({
        paths: {
          vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs'
        }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
        background: #f8fafc;
        padding: 24px;
        color: #0f172a;
      }
      .page {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      header h1 {
        font-size: 24px;
        margin-bottom: 8px;
        color: #1e293b;
      }
      header p {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
      }
      .section {
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
      }
      .section-header {
        padding: 16px 20px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .section-header h2 {
        font-size: 18px;
        color: #1e293b;
      }
      .section-body {
        padding: 20px;
      }
      .editor-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
        min-height: 420px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .panel-header {
        padding: 10px 16px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .code {
        background: #0f172a;
        color: #94a3b8;
      }
      .preview {
        background: #f8fafc;
        color: #64748b;
        border-bottom: 1px solid #e2e8f0;
      }
      .editor {
        flex: 1;
        min-height: 380px;
        height: 380px;
        max-height: 380px;
      }
      .table {
        flex: 1;
        padding: 16px;
        overflow: auto;
        min-height: 380px;
        height: 380px;
        max-height: 380px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
      .diag {
        display: grid;
        gap: 12px;
      }
      .diag-item {
        background: #f8fafc;
        border-left: 4px solid #6366f1;
        padding: 12px 14px;
        border-radius: 8px;
      }
      .solutions {
        display: grid;
        gap: 20px;
      }
      .solution {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
      }
      .solution-header {
        padding: 14px 18px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        font-weight: 600;
      }
      .solution-desc {
        padding: 12px 18px;
        color: #475569;
        line-height: 1.6;
      }
      @media (max-width: 900px) {
        .editor-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>📊 {{REPORT_TITLE}}</h1>
        <p>{{REPORT_DESC}}</p>
      </header>
      <div id="app"></div>
    </main>
    <script>
      const DEFAULT_TABLE_HEIGHT = 380;
      const DEFAULT_TABLE_WIDTH = 640;

      function showLoadError(msg) {
        document.body.innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444;font-size:15px;">${msg}</div>`;
      }
      function initApp() {
        {
          {
            CONFIG_BLOCK;
          }
        }
        const app = document.getElementById('app');
        function buildEditorBlock(id) {
          return `
         <div class="editor-grid">
           <div class="panel">
             <div class="panel-header code">VTable 配置</div>
             <div id="editor-${id}" class="editor"></div>
           </div>
           <div class="panel">
             <div class="panel-header preview">效果预览</div>
             <div id="table-${id}" class="table"></div>
           </div>
         </div>
       `;
        }
        app.innerHTML = `
       <section class="section">
         <div class="section-header"><h2>问题回顾</h2></div>
         <div class="section-body">${buildEditorBlock('problem')}</div>
       </section>
       <section class="section">
         <div class="section-header"><h2>诊断分析</h2></div>
         <div class="section-body">
           <div class="diag">
             <div class="diag-item">${diagnosis.problem}</div>
             <div class="diag-item">${diagnosis.cause}</div>
             ${diagnosis.suggestion ? `<div class="diag-item">${diagnosis.suggestion}</div>` : ''}
           </div>
         </div>
       </section>
       <section class="section">
         <div class="section-header"><h2>解决方案</h2></div>
         <div class="section-body">
           <div class="solutions">
             ${solutions
               .map(
                 (sol, idx) => `
               <div class="solution">
                 <div class="solution-header">${sol.title}</div>
                 <div class="solution-desc">${sol.description}</div>
                 <div class="section-body">${buildEditorBlock('solution-' + idx)}</div>
               </div>
             `
               )
               .join('')}
           </div>
         </div>
       </section>
     `;
        function sanitizeCode(codeStr) {
          return codeStr
            .replace(/^\s*import[\s\S]*?;?\s*$/gm, '')
            .replace(/^\s*export\s+/gm, '')
            .trim();
        }
        /* 方案 1：直接执行完整代码，拦截 VTable 构造器捕获实例 */
        function executeCode(codeStr, container) {
          const safeCode = sanitizeCode(codeStr);
          let capturedInstance = null;
          const ctorNames = ['ListTable', 'PivotTable', 'PivotChart'];
          const origCtors = {};
          ctorNames.forEach(name => {
            if (VTable[name]) {
              origCtors[name] = VTable[name];
              VTable[name] = function (options) {
                if (options && typeof options === 'object') {
                  options.container = container;
                  if (options.height == null) options.height = DEFAULT_TABLE_HEIGHT;
                  if (options.width == null) options.width = container.clientWidth || DEFAULT_TABLE_WIDTH;
                }
                const inst = new origCtors[name](options);
                capturedInstance = inst;
                return inst;
              };
              Object.keys(origCtors[name]).forEach(k => {
                VTable[name][k] = origCtors[name][k];
              });
              VTable[name].prototype = origCtors[name].prototype;
            }
          });
          try {
            new Function(safeCode)();
          } finally {
            ctorNames.forEach(name => {
              if (origCtors[name]) VTable[name] = origCtors[name];
            });
          }
          return capturedInstance;
        }
        /* 方案 2：正则提取配置对象（简单场景后备） */
        function parseConfig(codeStr) {
          const safeCode = sanitizeCode(codeStr);
          const patterns = [
            /new\s+VTable\.\w+\s*\(\s*({[\s\S]*})\s*\)[\s;]*$/,
            /(?:const|let|var)\s+\w+\s*=\s*new\s+VTable\.\w+\s*\(\s*({[\s\S]*})\s*\)[\s;]*$/,
            /(?:const|let|var)\s+\w+\s*=\s*({[\s\S]*});?\s*$/
          ];
          for (const pattern of patterns) {
            const match = safeCode.match(pattern);
            if (match) {
              return new Function(`return ${match[1]}`)();
            }
          }
          throw new Error('无法解析表格配置');
        }
        const editors = {};
        const tables = {};
        function renderTable(editorId, tableId) {
          const editor = editors[editorId];
          const container = document.getElementById(tableId);
          if (!editor || !container) return;
          try {
            const code = editor.getValue();
            if (tables[tableId]) {
              tables[tableId].release();
              tables[tableId] = null;
            }
            container.innerHTML = '';
            /* 优先尝试直接执行完整代码 */
            let execError = null;
            try {
              const inst = executeCode(code, container);
              if (inst) {
                tables[tableId] = inst;
                return;
              }
            } catch (e) {
              execError = e;
            }
            /* 回退到正则提取配置 */
            try {
              const config = parseConfig(code);
              config.container = container;
              if (config.height == null) config.height = DEFAULT_TABLE_HEIGHT;
              if (config.width == null) config.width = container.clientWidth || DEFAULT_TABLE_WIDTH;
              let TableClass = VTable.ListTable;
              if (code.includes('VTable.PivotTable')) TableClass = VTable.PivotTable;
              if (code.includes('VTable.PivotChart')) TableClass = VTable.PivotChart;
              tables[tableId] = new TableClass(config);
            } catch (e2) {
              throw execError || e2;
            }
          } catch (e) {
            container.innerHTML = `<div style="color:#ef4444;font-size:13px;line-height:1.6;">${e.message}</div>`;
          }
        }
        require(['vs/editor/editor.main'], function () {
          const problemEditorId = 'editor-problem';
          editors[problemEditorId] = monaco.editor.create(document.getElementById(problemEditorId), {
            value: problemReview.specCode || '',
            language: 'javascript',
            theme: 'vs-dark',
            fontSize: 13,
            lineNumbers: 'on',
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            automaticLayout: true,
            tabSize: 2,
            wordWrap: 'on'
          });
          let timer = null;
          editors[problemEditorId].onDidChangeModelContent(() => {
            clearTimeout(timer);
            timer = setTimeout(() => renderTable(problemEditorId, 'table-problem'), 600);
          });
          renderTable(problemEditorId, 'table-problem');
          solutions.forEach((sol, idx) => {
            const editorId = `editor-solution-${idx}`;
            const tableId = `table-solution-${idx}`;
            editors[editorId] = monaco.editor.create(document.getElementById(editorId), {
              value: sol.specCode || '',
              language: 'javascript',
              theme: 'vs-dark',
              fontSize: 13,
              lineNumbers: 'on',
              minimap: { enabled: false },
              scrollBeyondLastLine: false,
              automaticLayout: true,
              tabSize: 2,
              wordWrap: 'on'
            });
            let timer2 = null;
            editors[editorId].onDidChangeModelContent(() => {
              clearTimeout(timer2);
              timer2 = setTimeout(() => renderTable(editorId, tableId), 600);
            });
            renderTable(editorId, tableId);
          });
        });
      }
      window.onload = function () {
        if (!window.VTable) {
          showLoadError('VTable 脚本未成功加载（CDN 被拦截或网络异常），暂无法渲染示例表格。');
          return;
        }
        if (window.VChart && VTable.register && typeof VTable.register.chartModule === 'function') {
          VTable.register.chartModule('vchart', VChart);
        }
        initApp();
      };
    </script>
  </body>
</html>
